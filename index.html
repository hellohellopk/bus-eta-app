                        });
                    });
                } else {
                    resultsEl.innerHTML = `<div class="status-message" style="padding-top:30px;"><div style="font-size:30px;margin-bottom:12px;">🤷</div>找不到「${originKw} → ${destKw}」的路線</div>`;
                }
            },

            _execPlannerSearch(originKw, destKw, resultsEl) {

                const norm = s => String(s||'').toLowerCase().replace(/\s+/g,'');
                const okw = norm(originKw), dkw = norm(destKw);
                const CO_NAME = { kmb:'九巴', ctb:'城巴', nlb:'大嶼山巴士', gmb:'專線小巴', mtr:'港鐵巴士', lrt:'輕鐵' };
                const fareColors = { kmb:'#ff3b30', ctb:'#ff9500', nlb:'#007aff', gmb:'#34c759' };
                const bgClass = { kmb:'bg-kmb', ctb:'bg-ctb', nlb:'bg-nlb', gmb:'bg-gmb' };
                const stopList = this.state.stopList || {};
                const results = [];

                Object.entries(this.state.routeList).forEach(([rid, r]) => {
                    if (!r?.co?.length) return;
                    if (r.co.includes('kmb') && r.serviceType && r.serviceType !== '1') return;
                    const co = r.co[0];
                    const stopIds = r.stops?.[co] || Object.values(r.stops||{})[0] || [];
                    if (stopIds.length < 2) return;

                    let origIdx = -1, destIdx = -1;
                    for (let _i = 0; _i < stopIds.length; _i++) {
                        const sn = norm(stopList?.[stopIds[_i]]?.name?.zh || stopList?.[stopIds[_i]]?.name?.en || '');
                        if (origIdx < 0 && sn.includes(okw)) origIdx = _i;
                        if (sn.includes(dkw)) destIdx = _i;
                        if (origIdx >= 0 && destIdx > origIdx) break;
                    }

                    const origZh = norm(r.orig?.zh||''), destZh = norm(r.dest?.zh||'');
                    const hasStopList = Object.keys(stopList).length > 0;
                    if (!hasStopList) {
                        if (origIdx < 0 && origZh.includes(okw)) origIdx = 0;
                        if (destIdx < 0 && destZh.includes(dkw)) destIdx = stopIds.length - 1;
                    } else {
                        if (origIdx >= 0 && destIdx < 0 && destZh.includes(dkw)) destIdx = stopIds.length - 1;
                        if (destIdx >= 0 && origIdx < 0 && origZh.includes(okw)) origIdx = 0;
                        if (origIdx < 0 && destIdx < 0 && origZh.includes(okw) && destZh.includes(dkw)) { origIdx = 0; destIdx = stopIds.length - 1; }
                    }

                    if (origIdx >= 0 && destIdx >= 0 && origIdx < destIdx) {
                        const fare = (r.fares && r.fares[origIdx] != null) ? r.fares[origIdx] : (r.fares?.[0] ?? r.fare ?? null);
                        const origStopName = origIdx > 0 ? (stopList[stopIds[origIdx]]?.name?.zh || r.orig?.zh||'') : (r.orig?.zh||'');
                        const destStopName = destIdx < stopIds.length-1 ? (stopList[stopIds[destIdx]]?.name?.zh || r.dest?.zh||'') : (r.dest?.zh||'');
                        const actualBound = r.bound?.[co] || 'O';
                        const actualDir = actualBound === 'I' ? 'I' : 'O';
                        results.push({ co, route: r.route||rid.split('+')[0], orig: origStopName, dest: destStopName, fare, origIdx, destIdx, totalStops: stopIds.length, stopIds, r, dir: actualDir, bound: actualBound === 'I' ? 'inbound' : 'outbound' });
                    }
                });

                (this.state.gmbAllRoutes || []).forEach(r => {
                    const sn_orig = norm(r.orig||''), sn_dest = norm(r.dest||'');
                    const stopsStr = norm(r.stops_str||'');
                    if ((sn_orig.includes(okw) || stopsStr.includes(okw)) && (sn_dest.includes(dkw) || stopsStr.includes(dkw))) {
                        results.push({ co:'gmb', route: r.route, orig: r.orig||'', dest: r.dest||'', fare: null, origIdx:0, destIdx:1, totalStops:0, stopIds:[], r, dir:'O', bound:'outbound', gmb_routeId: r.gmb_routeId, gmb_routeSeq: r.gmb_routeSeq });
                    }
                });

                if (results.length === 0) {
                    resultsEl.innerHTML = `<div class="status-message" style="padding-top:40px;"><div style="font-size:40px;margin-bottom:16px;">😔</div>找不到「${originKw}」→「${destKw}」的直達路線</div>`;
                    return;
                }

                const order = ['kmb','ctb','nlb','gmb'];
                results.sort((a,b) => (order.indexOf(a.co)-order.indexOf(b.co)) || a.route.localeCompare(b.route));

                let html = `<div style="font-size:13px;color:#8e8e93;padding:10px 4px 6px;">找到 ${results.length} 條直達路線</div>`;
                results.forEach((res, i) => {
                    const fareHtml = res.fare ? `<span style="font-size:16px;font-weight:700;color:${fareColors[res.co]||'#3a3a3c'};">$${res.fare}</span>` : '';
                    const stopInfo = res.totalStops > 0 ? `共 ${res.totalStops} 站` : '';
                    const actionIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c7c7cc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
                    html += `<div class="result-item planner-route-card" style="cursor:pointer;"
                        data-idx="${i}" data-co="${res.co}" data-route="${res.route}"
                        data-dir="${res.dir}" data-bound="${res.bound}"
                        data-orig="${(res.r?.orig?.zh||res.orig).replace(/"/g,'')}"
                        data-dest="${(res.r?.dest?.zh||res.dest).replace(/"/g,'')}">
                        <div class="result-item-left">
                            <div class="route-badge ${bgClass[res.co]||'bg-kmb'}" style="font-size:18px;font-weight:800;min-width:52px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:8px;">${res.route}</div>
                            <div class="result-item-text">
                                <div class="result-dest">${res.orig} → ${res.dest}</div>
                                <div class="result-meta">${CO_NAME[res.co]||res.co} ${stopInfo}</div>
                            </div>
                        </div>
                        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">${fareHtml}${actionIcon}</div>
                    </div>`;
                });
                resultsEl.innerHTML = html;
                this._plannerResults = results;

                resultsEl.querySelectorAll('.planner-route-card').forEach(el => {
                    el.addEventListener('click', async () => {
                        const i = parseInt(el.dataset.idx);
                        const res = this._plannerResults[i];
                        const co = el.dataset.co;
                        const dir = el.dataset.dir || 'O';
                        let gmbRouteId = res?.gmb_routeId || null;
                        let gmbRouteSeq = res?.gmb_routeSeq || null;

                        // If GMB routeId missing, find from gmbAllRoutes
                        if (co === 'gmb' && !gmbRouteId) {
                            if (this.state.gmbAllRoutes?.length) {
                                const match = this.state.gmbAllRoutes.find(g =>
                                    String(g.route) === String(el.dataset.route) &&
                                    (el.dataset.dest === '' || (g.dest||'').includes(el.dataset.dest.slice(0,4)))
                                ) || this.state.gmbAllRoutes.find(g => String(g.route) === String(el.dataset.route));
                                if (match) { gmbRouteId = match.gmb_routeId; gmbRouteSeq = match.gmb_routeSeq; }
                            } else {
                                // gmbAllRoutes not ready: fetch routeId from etagmb API directly
                                try {
                                    const regions = ['HKI','KLN','NT'];
                                    const destKw = (el.dataset.dest||'').slice(0,4);
                                    for (const region of regions) {
                                        const rd = await this.fetchJSON(`https://data.etagmb.gov.hk/route/${region}/${el.dataset.route}`);
                                        if (rd?.data?.length) {
                                            gmbRouteId = rd.data[0].route_id;
                                            const dirs = rd.data[0].directions || [];
                                            const matched = dirs.find(d => destKw && (d.dest_tc||'').includes(destKw)) || dirs[0];
                                            gmbRouteSeq = matched?.route_seq || 1;
                                            break;
                                        }
                                    }
                                } catch(e) {}
                            }
                        }
                        this.openMapModal({
                            operator: co, route: el.dataset.route,
                            orig: el.dataset.orig, dest: el.dataset.dest,
                            dir, bound: el.dataset.bound,
                            kmbdir: dir, ctbdir: dir, opName: co,
                            gmb_routeId: gmbRouteId,
                            gmb_routeSeq: gmbRouteSeq,
                            stops: res?.stopIds || [],
                        });
                    });
                });
            },

            

            

            debounceSearch() { clearTimeout(this.state.searchTimeout); this.state.searchTimeout = setTimeout(() => this.performSearch(), 400); },

            async performSearch() {
                const inputVal = document.getElementById('route-input').value.trim().toUpperCase();
                const resultsArea = document.getElementById('search-results');

                // Show DB status
                const dbStatus = document.getElementById('db-status');
                if (dbStatus) dbStatus.textContent = this.state.isDataReady ? `✅ ${Object.keys(this.state.routeList||{}).length} 條路線已就緒` : '⚠️ 未匯入資料庫（使用基本搜尋）';

                if (!inputVal) {
                    return resultsArea.innerHTML = `
                        <div class="status-message" style="padding-top: 40px;">
                            <div style="font-size: 40px; margin-bottom: 16px;">🔍</div>
                            輸入路線號碼搜尋<br>或輸入「起點 終點」搜尋路線<br><br>
                            <span style="font-size:12px; color:#aaa;">例：70 或 宏景 鑽石山</span>
                        </div>
                    `;
                }

                // ── O/D 起訖點搜尋：偵測「起點 終點」格式 ──
                const rawInput = document.getElementById('route-input').value.trim();
                const spaceIdx = rawInput.search(/\s+/);
                if (spaceIdx > 0) {
                    const originKw = rawInput.slice(0, spaceIdx).trim();
                    const destKw   = rawInput.slice(spaceIdx).trim();
                    if (originKw.length >= 2 && destKw.length >= 2 && !/^[A-Z0-9]+$/.test(rawInput.replace(/\s/,''))) {
                        await this.searchByOD(originKw, destKw, resultsArea);
                        return;
                    }
                }
                
                resultsArea.innerHTML = '<div class="status-message">正在智慧搜尋中... ⏳</div>';

                // ── 如果已匯入 hkbus 資料庫，用高速本地搜尋 ──
                if (this.state.isDataReady && this.state.routeList) {
                    const keywords = inputVal.split(/\s+/);
                    const isMatch = (...args) => { const s = args.join(' ').toUpperCase(); return keywords.every(kw => s.includes(kw)); };
                    const CO_NAME  = { kmb:'九巴', ctb:'城巴', nlb:'大嶼山巴士', gmb:'專線小巴', mtr:'港鐵巴士', lrt:'輕鐵' };
                    const CO_ORDER = ['kmb','ctb','nlb','gmb'];
                    let results = [];
                    Object.entries(this.state.routeList).forEach(([routeKey, r]) => {
                        if (!r || !r.co || !r.co.length) return;
                        if (r.co.includes('kmb') && r.serviceType && r.serviceType !== '1') return;
                        if (r.co.every(c => ['mtr','lrt','sunferry','fortuneferry','hkkf','nwff'].includes(c))) return; // 排除港鐵/輕鐵/渡輪
                        const origZh = r.orig?.zh || '', destZh = r.dest?.zh || '', routeNo = r.route || '';
                        let matched = isMatch(routeNo, origZh, destZh);
                        if (!matched && this.state.stopList && (keywords.join('').match(/[一-鿿]/g)||[]).length >= 2) {
                            matched = Object.values(r.stops || {}).flat().some(sid => isMatch(this.state.stopList[sid]?.name?.zh || ''));
                        }
                        if (!matched) return;
                        r.co.forEach(co => {
                            if (['mtr','lrt','sunferry','fortuneferry','hkkf','nwff'].includes(co)) return; // 排除港鐵/輕鐵/渡輪
                            // routeFareList: 每個方向係獨立 entry，bound 已係正確方向
                            const bnd = r.bound?.[co] || 'O';
                            const d = (bnd === 'I') ? 'I' : 'O';
                            results.push({
                                routeKey, operator: co, route: routeNo, dir: d,
                                orig: origZh,   // 直接用 entry 本身的 orig/dest，唔需要 swap
                                dest: destZh,
                                opName: CO_NAME[co] || co,
                                bound: d === 'I' ? 'inbound' : 'outbound',
                                stops: r.stops?.[co] || [],
                                nlbId: r.nlbId || null,
                                nlb_routeId: r.nlbId || null,
                                gmb_routeId: r.gtfsId ? parseInt(r.gtfsId) : null,
                                gmb_routeSeq: d === 'I' ? 2 : 1,
                                gmb_route: r.route,
                                gmb_dest: destZh,
                                serviceType: r.serviceType || '1'
                            });
                        });
                    });
                    const pq = keywords[0];
                    results.sort((a, b) => {
                        const ae = a.route === pq, be = b.route === pq;
                        if (ae && !be) return -1; if (!ae && be) return 1;
                        const ao = CO_ORDER.indexOf(a.operator), bo = CO_ORDER.indexOf(b.operator);
                        if (ao !== bo) return ao - bo;
                        return a.route.localeCompare(b.route, undefined, { numeric:true, sensitivity:'base' });
                    });
                    this.state.currentSearchRouteResults = results.slice(0, 150);
                    this.renderSearchResultsUI();
                    return;
                }

                // ── 未匯入資料庫：使用原本 API 搜尋 ──
                const keywords = inputVal.split(/\s+/); 

                try {
                    let routeResults = [];
                    const [kmbRoutes, ctbRoutes, nlbRoutes, kmbDict, ctbList] = await Promise.all([
                        this.getKMBRoutes(), this.getCTBRoutes(), this.getNLBRoutes(),
                        this.getKMBStops(), this.getCTBAllStops()
                    ]);
                    
                    const isMatch = (...args) => {
                        const searchString = args.join(' ').toUpperCase();
                        return keywords.every(kw => searchString.includes(kw));
                    };

                    // ========================================================
                    // 第一階段：傳統路線文字比對 (包含小巴所有的「途經站」 stops_str)
                    // ========================================================
                    
                    if (kmbRoutes) {
                        kmbRoutes.filter(r => isMatch(r.route, r.orig_tc, r.dest_tc)).forEach(r => {
                            routeResults.push({ operator: 'kmb', route: r.route, bound: r.bound === 'I' ? 'inbound' : 'outbound', dir: r.bound, orig: r.orig_tc, dest: r.dest_tc, opName: '九巴' });
                        });
                    }
                    if (ctbRoutes) {
                        ctbRoutes.filter(r => isMatch(r.route, r.orig_tc, r.dest_tc)).forEach(r => {
                            routeResults.push({ operator: 'ctb', route: r.route, bound: 'outbound', dir: 'O', orig: r.orig_tc, dest: r.dest_tc, opName: '城巴' });
                            routeResults.push({ operator: 'ctb', route: r.route, bound: 'inbound', dir: 'I', orig: r.dest_tc, dest: r.orig_tc, opName: '城巴' });
                        });
                    }
                    if (nlbRoutes) {
                        nlbRoutes.filter(r => isMatch(r.routeNo, r.orig_tc, r.dest_tc)).forEach(r => {
                            routeResults.push({ operator: 'nlb', route: r.routeNo, nlb_routeId: r.routeId, orig: r.orig_tc, dest: r.dest_tc, opName: '大嶼山巴士' });
                        });
                    }
                    // 小巴：不只比起訖點，還比對剛才下載的 `stops_str` (涵蓋所有途經站)！
                    if (this.state.gmbAllRoutes && this.state.gmbAllRoutes.length > 0) {
                        this.state.gmbAllRoutes.forEach(r => {
                            if (isMatch(String(r.route), r.orig, r.dest, r.stops_str || '')) {
                                let exists = routeResults.some(res => res.operator === 'gmb' && res.route === r.route && res.gmb_routeSeq === r.gmb_routeSeq);
                                if (!exists) routeResults.push({...r});
                            }
                        });
                    } else {
                        try {
                            const _allGmb = await this.fetchJSON('https://data.etagmb.gov.hk/route');
                            if (_allGmb?.data?.routes) {
                                const _matched = [];
                                for (const [_region, _list] of Object.entries(_allGmb.data.routes)) {
                                    for (const _code of _list) { if (isMatch(String(_code))) _matched.push({region: _region, code: String(_code)}); }
                                }
                                for (const _m of _matched) {
                                    try {
                                        const _rd = await this.fetchJSON(`https://data.etagmb.gov.hk/route/${_m.region}/${_m.code}`);
                                        if (_rd?.data?.length) {
                                            _rd.data.forEach(route => {
                                                route.directions?.forEach(dir => {
                                                    const _ex = routeResults.some(res => res.operator === 'gmb' && res.route === _m.code && res.gmb_routeSeq === dir.route_seq);
                                                    if (!_ex) routeResults.push({ operator: 'gmb', route: _m.code, gmb_routeId: route.route_id, gmb_routeSeq: dir.route_seq, orig: dir.orig_tc, dest: dir.dest_tc, opName: '專線小巴', destinations: dir.dest_tc, gmb_route: _m.code, gmb_dest: dir.dest_tc });
                                                });
                                            });
                                        }
                                    } catch(e) {}
                                }
                            }
                        } catch(e) {}
                    }

                    // ========================================================
                    // 第二階段：九巴與城巴逆向反查 (找出名稱吻合的車站，並抓出所有「途經」該站的巴士路線)
                    // ========================================================
                    
                    let matchedKmbStops = [];
                    let matchedCtbStops = [];

                    if (kmbDict && (keywords.join('').match(/[\u4e00-\u9fff]/g)||[]).length >= 2) {
                        Object.keys(kmbDict).forEach(stopId => {
                            if (isMatch(kmbDict[stopId].name)) matchedKmbStops.push(stopId);
                        });
                    }
                    if (ctbList && (keywords.join('').match(/[\u4e00-\u9fff]/g)||[]).length >= 2) {
                        ctbList.forEach(s => {
                            if (isMatch(s.name_tc)) matchedCtbStops.push(s.stop);
                        });
                    }

                    // 為了避免過度呼叫 API，限制最大查詢數量
                    matchedKmbStops = matchedKmbStops.slice(0, 15);
                    matchedCtbStops = matchedCtbStops.slice(0, 15);

                    if (matchedKmbStops.length > 0 || matchedCtbStops.length > 0) {
                        let discoveredRoutes = {};

                        const kmbPromises = matchedKmbStops.map(async stopId => {
                            try {
                                const res = await this.fetchJSON(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stopId}`);
                                if(res && res.data) {
                                    res.data.forEach(item => {
                                        if (item.service_type === 1) {
                                            let bound = item.dir === 'I' ? 'inbound' : 'outbound';
                                            let key = `kmb-${item.route}-${item.dir}`;
                                            if(!discoveredRoutes[key]) {
                                                discoveredRoutes[key] = { operator: 'kmb', route: item.route, bound: bound, dir: item.dir, orig: '途經該站', dest: item.dest_tc, opName: '九巴' };
                                            }
                                        }
                                    });
                                }
                            } catch(e) {}
                        });

                        const ctbPromises = matchedCtbStops.map(async stopId => {
                            try {
                                const res = await this.fetchJSON(`https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${stopId}`);
                                if(res && res.data) {
                                    res.data.forEach(item => {
                                        if (!(item.rmk_tc && item.rmk_tc.includes('九巴時段'))) {
                                            let bound = item.dir === 'I' ? 'inbound' : 'outbound';
                                            let key = `ctb-${item.route}-${item.dir}`;
                                            if(!discoveredRoutes[key]) {
                                                discoveredRoutes[key] = { operator: 'ctb', route: item.route, bound: bound, dir: item.dir, orig: '途經該站', dest: item.dest_tc, opName: '城巴' };
                                            }
                                        }
                                    });
                                }
                            } catch(e) {}
                        });

                        await Promise.all([...kmbPromises, ...ctbPromises]);

                        // 將逆向查出的路線合併到結果中，並補回真實的起點
                        Object.values(discoveredRoutes).forEach(dr => {
                            let exists = routeResults.some(r => r.operator === dr.operator && r.route === dr.route && r.dir === dr.dir);
                            if (!exists) {
                                if (dr.operator === 'kmb' && kmbRoutes) {
                                    let rData = kmbRoutes.find(r => r.route === dr.route && r.bound === dr.dir);
                                    if (rData) dr.orig = rData.orig_tc;
                                } else if (dr.operator === 'ctb' && ctbRoutes) {
                                    let rData = ctbRoutes.find(r => r.route === dr.route && r.dest_tc === dr.dest);
                                    if (rData) dr.orig = rData.orig_tc;
                                }
                                routeResults.push(dr);
                            }
                        });
                    }

                    // ========================================================
                    // 第三階段：統一智能排序與渲染
                    // ========================================================
                    
                    const primaryQuery = keywords[0];
                    // Deduplicate: same operator+route+direction only once
                    routeResults = routeResults.filter((item, idx, arr) =>
                        arr.findIndex(x => x.operator === item.operator && x.route === item.route && x.dest === item.dest) === idx
                    );
                    routeResults.sort((a, b) => {
                        const aExact = a.route === primaryQuery; const bExact = b.route === primaryQuery;
                        if (aExact && !bExact) return -1; if (!aExact && bExact) return 1;
                        return a.route.localeCompare(b.route, undefined, {numeric: true, sensitivity: 'base'});
                    });
                    
                    this.state.currentSearchRouteResults = routeResults.slice(0, 150); 
                    this.renderSearchResultsUI();
                    
                } catch (e) { resultsArea.innerHTML = '<div class="status-message">搜尋發生異常，請重試。</div>'; }
            },


            getFareColor(operator) {
                const op = (operator || '').toLowerCase();
                if (op === 'kmb') return '#ff3b30';
                if (op === 'ctb') return '#ff9500';
                if (op === 'nlb') return '#007aff';
                if (op === 'gmb') return '#34c759';
                return '#3a3a3c';
            },

            getFareColor(operator) {
                const op = (operator || '').toLowerCase();
                if (op === 'kmb') return '#ff3b30';
                if (op === 'ctb') return '#ff9500';
                if (op === 'nlb') return '#007aff';
                if (op === 'gmb') return '#34c759';
                return '#3a3a3c';
            },

                        <button onclick="document.getElementById('route-input').value=''; app.performSearch();"

                            ✕ 清除
                        </button>
                    </div>`;
                }

                if (this.state.currentSearchRouteResults.length > 0) {
                    html += `<div class="search-section-title">🚌 相關路線 (${this.state.currentSearchRouteResults.length})</div>`;
                    html += this.state.currentSearchRouteResults.map((item, idx) => {
                        let cColor = item.operator === 'ctb' ? 'var(--ctb-yellow)' : 
                                    (item.operator === 'nlb' ? 'var(--nlb-blue)' :

                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c7c7cc" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </div>`;
                    }).join('');
                }

                if (html === '') {
                    html = `
                    <div class="status-message" style="padding-top: 40px;">
                        <div style="font-size: 40px; margin-bottom: 16px;">🤔</div>
                        找不到相關路線或地點<br>請檢查是否有錯字
                    </div>`;
                }

                resultsArea.innerHTML = html;
            },

            async selectRouteDirection(index) {
                this.state.activeSearchRouteData = this.state.currentSearchRouteResults[index];
                const resultsArea = document.getElementById('search-results');
                resultsArea.innerHTML = '<div class="status-message">載入全線車站中... ⏳</div>';

                try {
                    let stops = [];
                    let op = this.state.activeSearchRouteData.operator;
                    // 優先用 hkbus stopList（已匯入）
                    const stopIds = this.state.activeSearchRouteData.stops || [];
                    if (stopIds.length > 0 && this.state.stopList) {
                        let raw = stopIds.map((sid, idx) => {
                            const s = this.state.stopList[sid] || {};
                            return { id: sid, stopId: sid, name: s.name?.zh || '未知車站', lat: s.location?.lat, lng: s.location?.lng, seq: idx + 1 };
                        });
                        // routeFareList: stops 已按該方向排列，唔需要反轉
                        stops = raw;
                    } else if (op === 'kmb') {
                        const dict = await this.getKMBStops();
                        const res = await this.fetchJSON(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${this.state.activeSearchRouteData.route}/${this.state.activeSearchRouteData.bound}/1`);
                        if(res && res.data) stops = res.data.map(s => ({ id: s.stop, stopId: s.stop, name: dict && dict[s.stop] ? dict[s.stop].name : '未知車站', seq: s.seq }));
                    } else if (op === 'ctb') {
                        const res = await this.fetchJSON(`https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/${this.state.activeSearchRouteData.route}/${(this.state.activeSearchRouteData.bound === 'I' || this.state.activeSearchRouteData.bound === 'inbound') ? 'inbound' : 'outbound'}`);
                        if(res && res.data) {
                            stops = (await Promise.all(res.data.map(async s => {
                                const stopData = await this.getCTBStop(s.stop);
                                return { id: s.stop, stopId: s.stop, name: stopData ? stopData.name_tc : '未知車站', seq: s.seq };
                            })));
                        }
                    } else if (op === 'nlb') {
                        const _sNlbRid = this.state.activeSearchRouteData.nlb_routeId || this.state.activeSearchRouteData.nlbId;
                        const res = await this.fetchJSON(`https://rt.data.gov.hk/v2/transport/nlb/stop.php?action=list&routeId=${_sNlbRid}`);
                        if(res && res.stops) {
                            stops = res.stops.map((s, idx) => ({ id: s.stopId, stopId: s.stopId, name: s.stopName_c, seq: s.stopSequence || (idx + 1), lat: s.latitude, lng: s.longitude }));
                        }
                    } else if (op === 'gmb') {
                        let _gmbData = this.state.activeSearchRouteData;
                        if (!_gmbData.gmb_routeId) {
                            if (this.state.gmbAllRoutes?.length) {
                                const _gm = this.state.gmbAllRoutes.find(g => String(g.route) === String(_gmbData.route) && (_gmbData.gmb_dest ? g.dest.includes(_gmbData.gmb_dest?.slice(0,4)) : true))
                                         || this.state.gmbAllRoutes.find(g => String(g.route) === String(_gmbData.route));
                                if (_gm) { _gmbData = {..._gmbData, gmb_routeId: _gm.gmb_routeId, gmb_routeSeq: _gm.gmb_routeSeq}; this.state.activeSearchRouteData = _gmbData; }
                            }
                            if (!_gmbData.gmb_routeId) {
                                for (const _region of ['HKI','KLN','NT']) {
                                    const _rd = await this.fetchJSON(`https://data.etagmb.gov.hk/route/${_region}/${_gmbData.route}`);
                                    if (_rd?.data?.length) {
                                        const _matched = _rd.data[0].directions.find(d => _gmbData.dest && d.dest_tc.includes(_gmbData.dest.slice(0,4))) || _rd.data[0].directions[0];
                                        _gmbData = {..._gmbData, gmb_routeId: _rd.data[0].route_id, gmb_routeSeq: _matched?.route_seq || 1};
                                        this.state.activeSearchRouteData = _gmbData; break;
                                    }
                                }
                            }
                        }
                        const res = await this.fetchJSON(`https://data.etagmb.gov.hk/route-stop/${_gmbData.gmb_routeId}/${_gmbData.gmb_routeSeq}`);
                        if(res && res.data && res.data.route_stops) stops = res.data.route_stops.map(s => ({ id: s.stop_id, stopId: s.stop_id, name: s.name_tc, seq: s.stop_seq }));
                    }

                    this.state.currentStopsResults = stops; let primaryColor = this.getPrimaryColor(op);
                    
                    let listHtml = `
                    <div style="margin-bottom:12px; margin-top:4px;">
                        <button onclick="app.renderSearchResultsUI()" style="background:none; border:none; color:var(--apple-blue); font-weight:700; font-size:15px; cursor:pointer; display:flex; align-items:center; gap:4px;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                            返回
                        </button>
                    </div>
                    <div class="search-section-title" style="font-size: 17px; color: ${primaryColor}; text-transform:none; margin-bottom: 16px;">
                        ${this.state.activeSearchRouteData.route} <span style="font-size:14px; color:var(--text-main); font-weight:600; margin-left:4px;">往 ${this.state.activeSearchRouteData.dest}</span>
                    </div><div class="stop-list-container" style="--route-color: ${primaryColor}">`; 

                    stops.forEach((stop, idx) => {
                        let isSaved = this.isRouteSaved(this.state.activeSearchRouteData, stop);
                        let starColor = isSaved ? '#FFCC00' : '#e5e5ea';
                        let starFill = isSaved ? '#FFCC00' : 'none';

                        // 車費：fares 係字串陣列，index = 站序 (0-based)
                        const rEntry = this.state.routeList?.[this.state.activeSearchRouteData.routeKey];
                        const fareArr = rEntry?.fares;
                        let fareHtml = '';
                        if (Array.isArray(fareArr) && fareArr[idx]) {
                            fareHtml = `<span style="font-size:16px; color:${this.getFareColor(this.state.activeSearchRouteData.operator)}; font-weight:700; margin-left:auto; padding-left:8px; flex-shrink:0;">$${fareArr[idx]}</span>`;
                        }
                        listHtml += `<div class="stop-item" onclick="app.openMapModalFromSearch(${idx})">
                            <div class="stop-dot"></div>
                            <div class="stop-info">
                                <div class="stop-text-content">
                                    <div class="stop-title-wrap" style="display:flex; align-items:center; width:100%;"><div class="stop-seq">${stop.seq}</div><div class="stop-name" style="flex:1;">${stop.name}</div>${fareHtml}</div>
                                    <div class="stop-eta-container" id="search-eta-${stop.seq}"></div>
                                </div>
                                <button class="fav-star-btn" style="color: ${starColor};" onclick="app.toggleSearchSave(${idx}, event)">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="${starFill}" stroke="currentColor" stroke-width="1.5"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                                </button>
                            </div>
                        </div>`;
                    });
                    resultsArea.innerHTML = listHtml + '</div>';
                    this.loadAllETAsForList(stops, this.state.activeSearchRouteData, 'search-eta-');

                } catch(e) { resultsArea.innerHTML = '<div class="status-message">獲取車站失敗，請檢查網路連線。</div>'; }
            },

            // --- 收藏共用邏輯 ---
            generateSaveObj(routeContext, stop) {
                let op = routeContext.operator || (Array.isArray(routeContext.operators) ? routeContext.operators[0] : routeContext.operators);
                let dirCode = routeContext.dir || routeContext.kmb_dir || routeContext.ctb_dir || routeContext.bound;
                let dir = (dirCode === 'I' || dirCode === 'inbound') ? 'I' : 'O';

                const newRoute = { stopName: stop.name, route: routeContext.route, operators: [op], destinations: routeContext.dest || routeContext.destinations };
                if (op === 'kmb') { newRoute.kmb_stop = stop.id || stop.stopId; newRoute.kmb_dir = dir; }
                else if (op === 'ctb') { newRoute.ctb_stop = stop.id || stop.stopId; newRoute.ctb_dir = dir; }
                else if (op === 'nlb') { newRoute.nlb_stopId = stop.id || stop.stopId; newRoute.nlb_routeId = routeContext.nlb_routeId || routeContext.nlbId; }
                else if (op === 'gmb') { newRoute.gmb_routeId = routeContext.gmb_routeId; newRoute.gmb_routeSeq = routeContext.gmb_routeSeq; newRoute.gmb_stopId = stop.id || stop.stopId; newRoute.gmb_stopSeq = stop.seq; }
                return newRoute;
            },

            isRouteSaved(routeContext, stop) {
                const target = this.generateSaveObj(routeContext, stop);
                return this.state.savedRoutes.some(r => r.route === target.route && r.stopName === target.stopName && (r.kmb_dir === target.kmb_dir || r.ctb_dir === target.ctb_dir || r.nlb_routeId === target.nlb_routeId || r.gmb_routeId === target.gmb_routeId));
            },

            toggleStarBtn(newRoute, btn) {
                const existingIndex = this.state.savedRoutes.findIndex(r => r.route === newRoute.route && r.stopName === newRoute.stopName && (r.kmb_dir === newRoute.kmb_dir || r.ctb_dir === newRoute.ctb_dir || r.nlb_routeId === newRoute.nlb_routeId || r.gmb_routeId === newRoute.gmb_routeId));
                if (existingIndex > -1) {
                    this.state.savedRoutes.splice(existingIndex, 1);
                    btn.style.color = '#e5e5ea';
                    btn.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
                } else {
                    this.state.savedRoutes.push(newRoute);
                    btn.style.color = '#FFCC00';
                    btn.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="#FFCC00" stroke="#FFCC00" stroke-width="1.5"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
                }
                this.saveData(false);
            },
            toggleSearchSave(idx, event) { event.stopPropagation(); this.toggleStarBtn(this.generateSaveObj(this.state.activeSearchRouteData, this.state.currentStopsResults[idx]), event.currentTarget); },
            toggleMapSave(idx, event) { event.stopPropagation(); this.toggleStarBtn(this.generateSaveObj(this.state.currentMapRouteContext, this.state.currentMapStops[idx]), event.currentTarget); },

            openMapModalFromSearch(idx) {
                const stop = this.state.currentStopsResults[idx];
                const baseRoute = this.state.activeSearchRouteData;
                this.openMapModal(this.generateSaveObj(baseRoute, stop));
            },

            // --- 收藏頁面渲染 ---
            async renderBuses() {
                const container = document.getElementById('bus-container');
                if(this.state.savedRoutes.length === 0) { 
                    container.innerHTML = `
                        <div class="status-message">
                            <div style="font-size: 50px; margin-bottom: 20px;">⭐</div>
                            目前沒有儲存任何路線。<br>請點擊下方「🔍 搜尋」新增。
                        </div>`; 
                    return; 
                }

                try {
                    const routesData = await Promise.all(this.state.savedRoutes.map(async (route) => {
                        if (!route.operators || !route.operators.length) {
                            route.operators = [route.operator || 'kmb'];
                        }
                        let allETA = []; let op = Array.isArray(route.operators) ? route.operators[0] : (route.operators || route.operator);
                        if (route.operators.includes('kmb') && route.operators.includes('ctb')) {
                            const [kRes, cRes] = await Promise.all([
                                this.fetchJSON(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${route.kmb_stop}/${route.route}/1`),
                                this.fetchJSON(`https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${route.ctb_stop}/${route.route}`)
                            ]);
                            if(kRes && kRes.data) kRes.data.filter(b => b.dir === route.kmb_dir).slice(0,3).forEach(b => { if (b.eta) allETA.push({ eta: b.eta }); });
                            if(cRes && cRes.data) cRes.data.filter(b => b.dir === route.ctb_dir).slice(0,3).forEach(b => { if (b.eta && !(b.rmk_tc||'').includes('九巴時段')) allETA.push({ eta: b.eta }); });
                        } else if (op === 'kmb') {
                            let res = await this.fetchJSON(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${route.kmb_stop}/${route.route}/1`);
                            if(res && res.data) allETA = res.data.filter(b => b.dir === route.kmb_dir).map(b => ({ eta: b.eta }));
                        } else if (op === 'ctb') {
                            let res = await this.fetchJSON(`https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${route.ctb_stop}/${route.route}`);
                            if(res && res.data) allETA = res.data.filter(b => b.dir === route.ctb_dir).map(b => ({ eta: b.eta }));
                        } else if (op === 'nlb') {
                            const _favNlbRid = route.nlb_routeId || route.nlbId;
                            let res = await this.fetchJSON(`https://rt.data.gov.hk/v2/transport/nlb/stop.php?action=estimatedArrivals&routeId=${_favNlbRid}&stopId=${route.nlb_stopId}`);
                            if(res && res.estimatedArrivals) allETA = res.estimatedArrivals.filter(b=>b.estimatedArrivalTime).map(bus => ({ eta: bus.estimatedArrivalTime }));
                        } else if (op === 'gmb') {
                            if (!route.gmb_routeId) { for (const _r of ['HKI','KLN','NT']) { const _d = await this.fetchJSON(`https://data.etagmb.gov.hk/route/${_r}/${route.route}`); if (_d?.data?.length) { const _m = _d.data[0].directions.find(d => route.destinations && d.dest_tc.includes(route.destinations.slice(0,4))) || _d.data[0].directions[0]; route.gmb_routeId = _d.data[0].route_id; route.gmb_routeSeq = _m?.route_seq || 1; break; } } }
                            let res = await this.fetchJSON(`https://data.etagmb.gov.hk/eta/route-stop/${route.gmb_routeId}/${route.gmb_stopId}`);
                            if(res && res.data) {
                                let routeData = res.data.find(d => String(d.route_seq) === String(route.gmb_routeSeq));
                                if(routeData && routeData.eta) allETA = routeData.eta.filter(e=>e.timestamp).map(b => ({ eta: b.timestamp }));
                            }
                        }
                        allETA.sort((a,b) => new Date(a.eta.replace(' ','T')) - new Date(b.eta.replace(' ','T')));
                        return { route, etas: this.formatETAs(allETA) };
                    }));

                    container.innerHTML = '';
                    routesData.forEach(item => {
                        const cardDiv = document.createElement('div'); cardDiv.className = 'route-card clickable';
                        cardDiv.onclick = (e) => { if (!e.target.closest('.delete-route-btn') && !e.target.closest('.drag-handle')) this.openMapModal(item.route); };

                        let badgeClass = 'bg-kmb'; let opClass = 'arriving-kmb';
                        if (item.route.operators.includes('kmb') && item.route.operators.includes('ctb')) { badgeClass = 'bg-joint'; } 
                        else if ((Array.isArray(item.route.operators) ? item.route.operators[0] : item.route.operators) === 'ctb') { badgeClass = 'bg-ctb'; opClass = 'arriving-ctb'; } 
                        else if ((Array.isArray(item.route.operators) ? item.route.operators[0] : item.route.operators) === 'nlb') { badgeClass = 'bg-nlb'; opClass = 'arriving-nlb'; } 
                        else if ((Array.isArray(item.route.operators) ? item.route.operators[0] : item.route.operators) === 'gmb') { badgeClass = 'bg-gmb'; opClass = 'arriving-gmb'; }

                        let etaHtml = item.etas.length === 0 ? `<div class="eta-row no-data">暫無班次</div>` : item.etas.map((eta, i) => {
                            let text = eta.min <= 2 ? `<span class="${opClass}">${eta.min===0 ? '即將到達' : '<strong>' + eta.min + '</strong> 分鐘'}</span>` : `<strong>${eta.min}</strong> 分鐘`;
                            return i === 0 ? `<div class="eta-row eta-primary">${text}</div>` : `<div class="eta-row eta-secondary"><strong>${eta.min}</strong> 分鐘</div>`;
                        }).join('');

                        // 車費 lookup for favourites card
                        let favFare = '';
                        if (this.state.routeList) {
                            const rObj = item.route;
                            const op = (rObj.operators?.[0] || rObj.operator || '').toLowerCase();
                            const rawDir = rObj.kmb_dir || rObj.ctb_dir || rObj.dir || rObj.bound || 'O';
                            const dir = (rawDir === 'I' || rawDir === 'inbound') ? 'I' : 'O';
                            let fEntry = Object.values(this.state.routeList).find(r =>
                                r.route === rObj.route && r.co?.includes(op) && r.bound?.[op] === dir
                            );
                            if (!fEntry) fEntry = Object.values(this.state.routeList).find(r =>
                                r.route === rObj.route && r.co?.includes(op)
                            );
                            if (!fEntry) fEntry = Object.values(this.state.routeList).find(r => r.route === rObj.route);
                            if (fEntry?.fares?.length) {
                                // Get fare for this stop: find stop index from stops array
                                const stopId = rObj.kmb_stop || rObj.ctb_stop || rObj.nlb_stopId || rObj.gmb_stopId;
                                const stops = fEntry.stops?.[op] || Object.values(fEntry.stops||{})[0] || [];
                                const stopIdx = stops.indexOf(stopId);
                                const fareVal = stopIdx >= 0 ? fEntry.fares[stopIdx] : fEntry.fares[fEntry.fares.length - 1];
                                if (fareVal) favFare = `<span style="font-size:13px; color:${this.getFareColor(op)}; font-weight:700; margin-left:4px;">$${fareVal}</span>`;
                            }
                        }

                        cardDiv.innerHTML = `
                            <div class="drag-handle"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line></svg></div>
                            <div class="bus-left">
                                <div class="route-badge ${badgeClass}">${item.route.route}</div>
                                <div class="route-info">
                                    <div class="destination">往 ${item.route.destinations}</div>
                                    <div class="station-name-sub"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg> ${item.route.stopName}</div>
                                </div>
                            </div>
                            <div class="eta-list" style="display:flex; flex-direction:column; align-items:flex-end;">${etaHtml}${favFare}</div>
                            <button class="delete-route-btn" onclick="event.stopPropagation(); app.deleteRoute(this)">×</button>
                        `;
                        container.appendChild(cardDiv);
                    });
                } catch(e) {}
            },

            async manualRefresh() {
                if (this.state.isLoading || this.state.currentTab !== 'favourites' || this.state.isEditMode) return;
                this.state.isLoading = true;
                this._loadingStart = Date.now();
                document.getElementById('refresh-btn').disabled = true;
                try {
                    await this.renderBuses();
                } catch(e) {
                    console.error('renderBuses error:', e);
                } finally {
                    this.state.isLoading = false;
                    this._loadingStart = null;
                    document.getElementById('refresh-btn').disabled = false;
                }
            },

            toggleEditMode() {
                if (this.state.savedRoutes.length === 0) return alert("目前沒有路線可以編輯喔！");
                this.state.isEditMode = !this.state.isEditMode;
                const container = document.getElementById('bus-container'); const editBtn = document.getElementById('edit-btn');
                if (this.state.isEditMode) {
                    container.classList.add('edit-mode'); editBtn.style.color = 'var(--apple-blue)'; 
                    if (typeof Sortable !== 'undefined') {
                        this.state.sortableInstance = new Sortable(container, {
                            handle: '.drag-handle', animation: 150, ghostClass: 'sortable-ghost', 
                            onEnd: (evt) => {
                                const movedItem = this.state.savedRoutes.splice(evt.oldIndex, 1)[0];
                                this.state.savedRoutes.splice(evt.newIndex, 0, movedItem); this.saveData(false); 
                            }
                        });
                    }
                } else {
                    container.classList.remove('edit-mode'); editBtn.style.color = 'var(--text-main)'; 
                    if (this.state.sortableInstance) { this.state.sortableInstance.destroy(); this.state.sortableInstance = null; }
                    this.manualRefresh();
                }
            },
            deleteRoute(btnElement) {
                const card = btnElement.closest('.route-card'); const index = Array.from(document.getElementById('bus-container').children).indexOf(card);
                this.state.savedRoutes.splice(index, 1); this.saveData(false); card.remove(); 
                if (this.state.savedRoutes.length === 0) this.toggleEditMode();
            },

            // --- 地圖與標記邏輯 ---
            changeMapStyle(styleKey) {
                if (!this.state.routeMap) return;
                if (this.state.currentTileLayer) {
                    this.state.routeMap.removeLayer(this.state.currentTileLayer);
                }
                if (styleKey === 'carto') {
                    this.state.currentTileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20, subdomains: 'abcd', attribution: '© CartoDB © OSM' }).addTo(this.state.routeMap);
                } else if (styleKey === 'gmap_road') {
                    this.state.currentTileLayer = L.tileLayer('https://mt{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}&hl=zh-HK', { maxZoom: 20, subdomains: '0123', attribution: '© Google Maps' }).addTo(this.state.routeMap);
                } else if (styleKey === 'gmap_sat') {
                    this.state.currentTileLayer = L.tileLayer('https://mt{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains: '0123', attribution: '© Google Maps' }).addTo(this.state.routeMap);
                } else if (styleKey === 'gmap_hybrid') {
                    this.state.currentTileLayer = L.tileLayer('https://mt{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}&hl=zh-HK', { maxZoom: 20, subdomains: '0123', attribution: '© Google Maps' }).addTo(this.state.routeMap);
                } else if (styleKey === 'osm') {
                    this.state.currentTileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(this.state.routeMap);
                } else {
                    const base = L.tileLayer('https://mapapi.geodata.gov.hk/gs/api/v1.0.0/xyz/basemap/wgs84/{z}/{x}/{y}.png', { maxZoom: 20 });
                    const label = L.tileLayer('https://mapapi.geodata.gov.hk/gs/api/v1.0.0/xyz/label/hk/tc/wgs84/{z}/{x}/{y}.png', { maxZoom: 20 });
                    this.state.currentTileLayer = L.layerGroup([base, label]).addTo(this.state.routeMap);
                }
            },

            toggleLiveGPS() {
                const btn = document.getElementById('map-gps-btn');
                if (this.state.gpsWatchId) {
                    navigator.geolocation.clearWatch(this.state.gpsWatchId);
                    this.state.gpsWatchId = null;
                    if (this.state.userLocationMarker) { this.state.routeMap.removeLayer(this.state.userLocationMarker); this.state.userLocationMarker = null; }
                    btn.classList.remove('tracking');
                    return;
                }
                if (!navigator.geolocation) return alert("您的設備不支援定位功能");
                btn.classList.add('tracking');
                
                this.state.gpsWatchId = navigator.geolocation.watchPosition((pos) => {
                    const lat = pos.coords.latitude, lng = pos.coords.longitude;
                    if (!this.state.userLocationMarker && this.state.routeMap) {
                        this.state.userLocationMarker = L.circleMarker([lat, lng], {
                            radius: 7, fillColor: "var(--apple-blue)", color: "#fff", weight: 2, opacity: 1, fillOpacity: 1, zIndexOffset: 2000
                        }).bindPopup("<b>目前位置</b>").addTo(this.state.routeMap);
                    } else if (this.state.userLocationMarker) {
                        this.state.userLocationMarker.setLatLng([lat, lng]);
                    }
                    if (this.state.routeMap) this.state.routeMap.setView([lat, lng], 17);
                }, (err) => {
                    alert("無法獲取定位！請確認已開啟 GPS 權限。");
                    this.toggleLiveGPS();
                }, { enableHighAccuracy: true, maximumAge: 5000 });
            },

            async openMapModal(routeObj) {
                if (this.state.isEditMode) return;
                this.state.currentMapRouteContext = routeObj; 
                const modal = document.getElementById('map-modal'); const mapContainer = document.getElementById('map-split-container'); const loading = document.getElementById('map-loading');
                
                                modal.style.display = 'flex'; mapContainer.style.display = 'none'; 
                loading.innerText = '正在載入地圖引擎... ⏳';
                loading.style.display = 'block';

                try {
                    await this.loadMapResources();
                    loading.innerText = '正在繪製全線車站與路線... ⏳';
                    
                    let stops = []; let operator = Array.isArray(routeObj.operators) ? routeObj.operators[0] : (routeObj.operators || routeObj.operator); 
                    let targetStopId = null;
                    if (routeObj.kmb_stop || routeObj.ctb_stop || routeObj.nlb_stopId || routeObj.gmb_stopId) {
                        targetStopId = operator === 'kmb' ? routeObj.kmb_stop : (operator === 'ctb' ? routeObj.ctb_stop : (operator === 'nlb' ? routeObj.nlb_stopId : routeObj.gmb_stopId));
                    }
                    
                    let dirCode = routeObj.dir || routeObj.kmb_dir || routeObj.ctb_dir || routeObj.bound;
                    let bound = (dirCode === 'I' || dirCode === 'inbound') ? 'inbound' : 'outbound';

                    if (operator === 'kmb') {
                        const dict = await this.getKMBStops();
                        const res = await this.fetchJSON(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${routeObj.route}/${bound}/1`);
                        if(res && res.data) stops = res.data.map(s => { let info = dict ? (dict[s.stop] || {}) : {}; return { id: s.stop, name: info.name || '未知車站', lat: info.lat, lng: info.lng, seq: s.seq }; });
                    } else if (operator === 'ctb') {
                        const res = await this.fetchJSON(`https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/${routeObj.route}/${(bound === 'I' || bound === 'inbound') ? 'inbound' : 'outbound'}`);
                        if(res && res.data) stops = (await Promise.all(res.data.map(async s => { const stopData = await this.getCTBStop(s.stop); return stopData ? { id: s.stop, name: stopData.name_tc, lat: stopData.lat, lng: stopData.long, seq: s.seq } : null; }))).filter(s => s !== null);
                    } else if (operator === 'nlb') {
                        const _mNlbRid = routeObj.nlb_routeId || routeObj.nlbId;
                        const res = await this.fetchJSON(`https://rt.data.gov.hk/v2/transport/nlb/stop.php?action=list&routeId=${_mNlbRid}`);
                        if(res && res.stops) stops = res.stops.map((s, idx) => ({ id: s.stopId, name: s.stopName_c, lat: s.latitude, lng: s.longitude, seq: s.stopSequence || (idx + 1) }));
                    } else if (operator === 'gmb') {
                        if (!routeObj.gmb_routeId) {
                            if (this.state.gmbAllRoutes?.length) {
                                const _gm = this.state.gmbAllRoutes.find(g => String(g.route) === String(routeObj.route) && (routeObj.dest ? g.dest.includes(routeObj.dest?.slice(0,4)) : true))
                                         || this.state.gmbAllRoutes.find(g => String(g.route) === String(routeObj.route));
                                if (_gm) { routeObj.gmb_routeId = _gm.gmb_routeId; routeObj.gmb_routeSeq = _gm.gmb_routeSeq; }
                            }
                            if (!routeObj.gmb_routeId) {
                                for (const _region of ['HKI','KLN','NT']) {
                                    const _rd = await this.fetchJSON(`https://data.etagmb.gov.hk/route/${_region}/${routeObj.route}`);
                                    if (_rd?.data?.length) {
                                        const _m = _rd.data[0].directions.find(d => routeObj.dest && d.dest_tc.includes(routeObj.dest.slice(0,4))) || _rd.data[0].directions[0];
                                        routeObj.gmb_routeId = _rd.data[0].route_id; routeObj.gmb_routeSeq = _m?.route_seq || 1; break;
                                    }
                                }
                            }
                        }
                        const res = await this.fetchJSON(`https://data.etagmb.gov.hk/route-stop/${routeObj.gmb_routeId}/${routeObj.gmb_routeSeq}`);
                        if(res && res.data && res.data.route_stops) {
                            const chunkArray = (arr, size) => Array.from({ length: Math.ceil(arr.length / size) }, (v, i) => arr.slice(i * size, i * size + size));
                            for (let chunk of chunkArray(res.data.route_stops, 10)) {
                                 stops.push(...(await Promise.all(chunk.map(async s => {
                                     // 動態獲取小巴坐標
                                     const coords = await this.getGMBStopCoords(s.stop_id);
                                     return { id: s.stop_id, name: s.name_tc, lat: coords ? coords.lat : null, lng: coords ? coords.lng : null, seq: s.stop_seq };
                                 }))));
                            }
                        }
                    }

                    this.state.currentMapStops = stops;
                    loading.style.display = 'none'; mapContainer.style.display = 'flex';
                    
                    if (this.state.routeMap) {
                        this.state.routeMap.remove();
                        this.state.gpsWatchId = null; this.state.userLocationMarker = null; 
                        document.getElementById('map-gps-btn').classList.remove('tracking');
                    }
                    
                    // 初始化地圖並載入所選的地圖樣式
                    this.state.routeMap = L.map('map-container');
                    this.state.currentTileLayer = null; 
                    this.changeMapStyle('gmap_road');

                    let latlngs = []; let primaryColor = this.getPrimaryColor(operator); this.state.routeMarkers = {}; 
                    let listHtml = `<div class="stop-list-container" style="--route-color: ${primaryColor}">`;
                    let targetSeq = null, targetMarker = null;

                    stops.forEach((s, idx) => {
                        let isTarget = targetStopId !== null && (String(s.id) === String(targetStopId)); 
                        if (isTarget) targetSeq = s.seq;

                        if (s.lat !== undefined && s.lng !== undefined && s.lat !== null && s.lng !== null) {
                            let latlng = [parseFloat(s.lat), parseFloat(s.lng)]; latlngs.push(latlng);
                            let markerHtml = isTarget ? `<div style="background-color:${primaryColor}; width:18px; height:18px; border-radius:50%; border:3px solid white; box-shadow: 0 0 6px rgba(0,0,0,0.5);"></div>` : `<div style="background-color:#fff; width:10px; height:10px; border-radius:50%; border:2px solid ${primaryColor};"></div>`;
                            let marker = L.marker(latlng, { icon: L.divIcon({ className: 'custom-div-icon', html: markerHtml, iconSize: isTarget?[18, 18]:[10, 10], iconAnchor: isTarget?[9, 9]:[5, 5] }), zIndexOffset: isTarget ? 1000 : 0 }).bindPopup(`<b style="font-size:14px; color:#111;">${s.seq}. ${s.name}</b>`);
                            marker.on('click', () => { this.clickStopInList(s.seq, s.lat, s.lng, s.id); });
                            marker.addTo(this.state.routeMap); this.state.routeMarkers[s.seq] = marker; if (isTarget) targetMarker = marker;
                        }

                        let isSaved = this.isRouteSaved(routeObj, s);
                        let starColor = isSaved ? '#FFCC00' : '#e5e5ea';
                        let starFill = isSaved ? '#FFCC00' : 'none';

                        // 車費 (map modal) - 支援 routeKey 或 route+dir 比對
                        let mFareArr = null;
                        if (this.state.routeList) {
                            const rk = routeObj.routeKey;
                            if (rk && this.state.routeList[rk]) {
                                mFareArr = this.state.routeList[rk].fares;
                            } else {
                                // fallback: match by route + operator + direction (from favourites)
                                const op = (routeObj.operators?.[0] || routeObj.operator || '').toLowerCase();
                                const rawDir = routeObj.kmb_dir || routeObj.ctb_dir || routeObj.dir || routeObj.bound || 'O';
                                const dir = (rawDir === 'I' || rawDir === 'inbound') ? 'I' : 'O';
                                console.log('[fare] fallback lookup:', routeObj.route, op, dir);
                                // Try exact match first
                                let matched = Object.values(this.state.routeList).find(r =>
                                    r.route === routeObj.route && r.co?.includes(op) && r.bound?.[op] === dir
                                );
                                // If not found, try any direction for this route+op
                                if (!matched) matched = Object.values(this.state.routeList).find(r =>
                                    r.route === routeObj.route && r.co?.includes(op)
                                );
                                // If still not found, try route number only
                                if (!matched) matched = Object.values(this.state.routeList).find(r =>
                                    r.route === routeObj.route
                                );
                                if (matched) { mFareArr = matched.fares; console.log('[fare] matched fares:', mFareArr?.slice(0,3)); }
                                else console.warn('[fare] no match for', routeObj.route, op, dir);
                            }
                        }
                        const mFareVal = Array.isArray(mFareArr) && mFareArr[idx] ? mFareArr[idx] : '';

                        listHtml += `
                            <div class="stop-item ${isTarget ? 'selected' : ''}" id="stop-item-${s.seq}" onclick="app.clickStopInList(${s.seq}, ${s.lat ? s.lat : 'null'}, ${s.lng ? s.lng : 'null'}, '${s.id}')">
                                <div class="stop-dot"></div>
                                <div class="stop-info">
                                    <div class="stop-text-content">
                                        <div class="stop-title-wrap" style="display:flex; align-items:center; width:100%;"><div class="stop-seq">${s.seq}</div><div class="stop-name" style="flex:1;">${s.name}</div></div>
                                        <div style="display:flex; align-items:center; gap:6px;">
                                            <div class="stop-eta-container" id="map-eta-${s.seq}"></div>
                                            ${mFareVal ? `<span id="map-fare-${s.seq}" style="font-size:13px; color:${this.getFareColor(operator)}; font-weight:700; white-space:nowrap;">$${mFareVal}</span>` : ''}
                                        </div>
                                    </div>
                                    <button class="fav-star-btn" style="color: ${starColor};" onclick="event.stopPropagation(); app.toggleMapSave(${idx}, event)">
                                        <svg width="28" height="28" viewBox="0 0 24 24" fill="${starFill}" stroke="currentColor" stroke-width="1.5"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                    
                    document.getElementById('map-stop-list').innerHTML = listHtml + `</div>`;

                    if (latlngs.length > 0) {
                        L.polyline(latlngs, {color: primaryColor, weight: 4, opacity: 0.8}).addTo(this.state.routeMap);
                        this.state.routeMap.fitBounds(L.polyline(latlngs).getBounds(), { padding: [30, 30] });
                    } else {
                        this.state.routeMap.setView([22.3193, 114.1694], 11);
                    }

                    setTimeout(() => { 
                        if(this.state.routeMap) this.state.routeMap.invalidateSize(); 
                        if (targetSeq) {
                            this.selectStopInList(targetSeq);
                            if (targetMarker) { this.state.routeMap.setView(targetMarker.getLatLng(), 17); targetMarker.openPopup(); }
                        }
                    }, 400);

                    this.loadAllETAsForList(stops, routeObj, 'map-eta-');

                } catch(e) { loading.innerHTML = '載入地圖失敗，請檢查網路連線。'; }
            },

            closeMapModal() { 
                document.getElementById('map-modal').style.display = 'none'; 
                if (this.state.gpsWatchId) { navigator.geolocation.clearWatch(this.state.gpsWatchId); this.state.gpsWatchId = null; }
            },
            
            clickStopInList(seq, lat, lng, stopId) {
                this.selectStopInList(seq);
                const marker = this.state.routeMarkers[seq];
                if (marker && this.state.routeMap && lat !== null && lng !== null) { this.state.routeMap.setView([lat, lng], 17, { animate: true }); marker.openPopup(); }
                this.fetchStopETAInMap(seq, stopId); 
            },

            selectStopInList(seq) {
                document.querySelectorAll('.stop-item').forEach(el => el.classList.remove('selected'));
                const target = document.getElementById(`stop-item-${seq}`);
                if (target) { target.classList.add('selected'); target.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            },

            async fetchStopETAInMap(seq, stopId) {
                document.querySelectorAll('.stop-eta-container').forEach(el => el.innerHTML = '');
                const etaContainer = document.getElementById(`map-eta-${seq}`); if (!etaContainer) return;
                etaContainer.innerHTML = '<span style="color:#888; font-size:12px;">載入中...</span>';

                const routeObj = this.state.currentMapRouteContext; if (!routeObj) return;
                let operator = Array.isArray(routeObj.operators) ? routeObj.operators[0] : (routeObj.operators || routeObj.operator);
                let route = routeObj.route;
                let isTargetStop = (operator === 'kmb' && String(stopId) === String(routeObj.kmb_stop)) || (operator === 'ctb' && String(stopId) === String(routeObj.ctb_stop)) || (operator === 'nlb' && String(stopId) === String(routeObj.nlb_stopId)) || (operator === 'gmb' && String(stopId) === String(routeObj.gmb_stopId));

                let allETA = [];
                try {
                    if (isTargetStop && routeObj.operators && routeObj.operators.includes('kmb') && routeObj.operators.includes('ctb')) {
                        const [kmbData, ctbData] = await Promise.all([ this.fetchJSON(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${routeObj.kmb_stop}/${route}/1`), this.fetchJSON(`https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${routeObj.ctb_stop}/${route}`) ]);
                        if(kmbData && kmbData.data) kmbData.data.filter(b => b.dir === routeObj.kmb_dir).slice(0, 3).forEach(b => { if (b.eta) allETA.push({ eta: b.eta }); });
                        if(ctbData && ctbData.data) ctbData.data.filter(b => b.dir === routeObj.ctb_dir).slice(0, 3).forEach(b => { if (b.eta && !(b.rmk_tc || '').includes('九巴時段')) allETA.push({ eta: b.eta }); });
                    } else {
                        let dirCode = routeObj.dir || routeObj.kmb_dir || routeObj.ctb_dir || routeObj.bound;
                        let dir = (dirCode === 'I' || dirCode === 'inbound') ? 'I' : 'O';

                        if (operator === 'kmb') {
                            const data = await this.fetchJSON(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${stopId}/${route}/1`);
                            if(data && data.data) allETA = data.data.filter(bus => bus.dir === dir).map(bus => ({ eta: bus.eta }));
                        } else if (operator === 'ctb') {
                            const data = await this.fetchJSON(`https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${stopId}/${route}`);
                            if(data && data.data) allETA = data.data.filter(bus => bus.dir === dir).map(bus => ({ eta: bus.eta }));
                        } else if (operator === 'nlb') {
                            const _fNlbRid = routeObj.nlb_routeId || routeObj.nlbId;
                            const data = await this.fetchJSON(`https://rt.data.gov.hk/v2/transport/nlb/stop.php?action=estimatedArrivals&routeId=${_fNlbRid}&stopId=${stopId}`);
                            if(data && data.estimatedArrivals) allETA = data.estimatedArrivals.filter(b=>b.estimatedArrivalTime).map(bus => ({ eta: bus.estimatedArrivalTime }));
                        } else if (operator === 'gmb') {
                            if (!routeObj.gmb_routeId) { for (const _r of ['HKI','KLN','NT']) { const _d = await this.fetchJSON(`https://data.etagmb.gov.hk/route/${_r}/${routeObj.route}`); if (_d?.data?.length) { const _m = _d.data[0].directions.find(d => routeObj.dest && d.dest_tc.includes(routeObj.dest.slice(0,4))) || _d.data[0].directions[0]; routeObj.gmb_routeId = _d.data[0].route_id; routeObj.gmb_routeSeq = _m?.route_seq || 1; break; } } }
                            const data = await this.fetchJSON(`https://data.etagmb.gov.hk/eta/route-stop/${routeObj.gmb_routeId}/${stopId}`);
                            if(data && data.data) {
                                let routeData = data.data.find(d => String(d.route_seq) === String(routeObj.gmb_routeSeq));
                                if(routeData && routeData.eta) allETA = routeData.eta.filter(e=>e.timestamp).map(bus => ({ eta: bus.timestamp }));
                            }
                        }
                    }
                    
                    let etas = this.formatETAs(allETA.sort((a, b) => new Date(a.eta.replace(' ','T')) - new Date(b.eta.replace(' ','T'))));
                    
                    if (etas.length === 0) { 
                        etaContainer.innerHTML = '<span style="color:#aaa; font-size:12px;">暫無班次</span>'; 
                    } else {
                        let opClass = this.getPrimaryColor(operator) === '#ce3043' ? 'arriving-kmb' : (this.getPrimaryColor(operator) === '#fccc0a' ? 'arriving-ctb' : (this.getPrimaryColor(operator) === '#0072c6' ? 'arriving-nlb' : 'arriving-gmb'));
                        let html = '';
                        etas.forEach((eta, i) => {
                            let text = eta.min <= 2 ? `<span class="${opClass}">${eta.min === 0 ? '即將到達' : '<strong>' + eta.min + '</strong> 分鐘'}</span>` : `<strong>${eta.min}</strong> 分鐘`;
                            html += i === 0 ? `<div class="eta-row eta-primary">${text}</div>` : `<div class="eta-row eta-secondary"><strong>${eta.min}</strong> 分鐘</div>`;
                        });
                        etaContainer.innerHTML = html;
                    }
                } catch (e) { etaContainer.innerHTML = '<span style="color:#aaa; font-size:12px;">載入失敗</span>'; }
            }
        };

        window.addEventListener('load', async () => {
            app.initPWA();
            app.loadData();
            // 確保 isLoading 永遠不會卡死
            app.state.isLoading = false;
            setTimeout(() => app.loadHKBusData(), 500);
            setTimeout(() => app.manualRefresh(), 1500);
            setTimeout(() => app.manualRefresh(), 4000);
            document.getElementById('planner-gps-btn')?.addEventListener('click', () => app.plannerUseGPS());
            document.getElementById('planner-search-btn')?.addEventListener('click', () => app.runPlannerSearch());
            document.getElementById('planner-origin')?.addEventListener('keydown', e => { if(e.key==='Enter') app.runPlannerSearch(); });
            document.getElementById('planner-dest')?.addEventListener('keydown', e => { if(e.key==='Enter') app.runPlannerSearch(); });
            setInterval(async () => {
                // 安全鎖：若 isLoading 超過 15 秒未解鎖，強制重置
                if (app.state.isLoading) {
                    if (!app._loadingStart) { app._loadingStart = Date.now(); }
                    else if (Date.now() - app._loadingStart > 15000) {
                        app.state.isLoading = false;
                        document.getElementById('refresh-btn').disabled = false;
                        app._loadingStart = null;
                    }
                    return;
                }
                app._loadingStart = null;
                if (app.state.currentTab === 'favourites' && !app.state.isEditMode) {
                    await app.manualRefresh();
                }
            }, 60000);
        });
    </script>
</body>
</html>
